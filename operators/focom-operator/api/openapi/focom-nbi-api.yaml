                    type: string
                    example: "Draft deletion request accepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /o-clouds/{oCloudId}/draft/validate:
    post:
      summary: Validate OCloud draft
      description: Validate the current draft OCloud configuration
      operationId: validateOCloudDraft
      tags:
        - OCloud Draft Management
