        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - Draft is in validated state and cannot be updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Delete OCloud draft
      description: Delete/abandon the current draft OCloud configuration
      operationId: deleteOCloudDraft
      tags:
        - OCloud Draft Management
      parameters:
        - $ref: "#/components/parameters/OCloudId"
