      parameters:
        - $ref: "#/components/parameters/TemplateInfoId"
      responses:
        "202":
          description: Accepted - Draft deletion request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Draft deletion request accepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /template-infos/{templateInfoId}/draft/validate:
    post:
      summary: Validate TemplateInfo draft
      description: Validate the current draft TemplateInfo configuration
      operationId: validateTemplateInfoDraft
      tags:
