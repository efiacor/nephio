openapi: 3.0.3
info:
  title: FOCOM North Bound Interface API
  description: |
    REST API for managing FOCOM provisioning requests through a North Bound Interface.
    This API provides endpoints to create, read, update, and delete FOCOM provisioning requests
    with support for draft revisions, validation, and approval workflows.
  version: 1.0.0
  contact:
    name: Nephio Project
    url: https://nephio.org
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  x-api-id: e9776a07-0813-4fca-9801-6f892f0a7c13
  x-audience: external-public

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://focom-nbi.nephio.org/api/v1
    description: Production server

paths:
  /focom-provisioning-requests:
    get:
      summary: List all FOCOM provisioning requests
      description: List the current approved revision of all FOCOM provisioning requests
      operationId: listFocomProvisioningRequests
      tags:
        - Provisioning Requests
      responses:
        "200":
          description: OK - List of FOCOM provisioning requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FocomProvisioningRequestInfo"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/draft:
    post:
      summary: Create new FOCOM provisioning request draft
      description: Create new FOCOM provisioning request in draft revision, referring to a FOCOM Managed Infrastructure Template
      operationId: createFocomProvisioningRequestDraft
      tags:
        - Draft Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FocomProvisioningRequestData"
      responses:
        "201":
          description: Created - FOCOM provisioning request draft created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}:
    get:
      summary: Get FOCOM provisioning request
      description: Get the current approved FOCOM provisioning request revision plus provisioning request status reported from the O2ims IMS server
      operationId: getFocomProvisioningRequest
      tags:
        - Provisioning Requests
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "200":
          description: OK - FOCOM provisioning request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestInfo"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Delete FOCOM provisioning request
      description: Delete the complete FOCOM provisioning request to trigger decommissioning of the cluster
      operationId: deleteFocomProvisioningRequest
      tags:
        - Provisioning Requests
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "202":
          description: Accepted - Deletion request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deletion request accepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}/draft:
    get:
      summary: Get FOCOM provisioning request draft
      description: Get the draft FOCOM provisioning request revision if exists, can be in either "Draft" or "Validated" state
      operationId: getFocomProvisioningRequestDraft
      tags:
        - Draft Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "200":
          description: OK - FOCOM provisioning request draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      summary: Update FOCOM provisioning request draft
      description: Update the current draft FOCOM provisioning request, only modifying specified parts
      operationId: updateFocomProvisioningRequestDraft
      tags:
        - Draft Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FocomProvisioningRequestDataUpdate"
      responses:
        "200":
          description: OK - FOCOM provisioning request draft updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict - Draft is in validated state and cannot be updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Delete FOCOM provisioning request draft
      description: Delete/abandon the current draft FOCOM provisioning request
      operationId: deleteFocomProvisioningRequestDraft
      tags:
        - Draft Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "202":
          description: Accepted - Draft deletion request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Draft deletion request accepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}/draft/validate:
    post:
      summary: Validate FOCOM provisioning request draft
      description: Validate the current draft FOCOM provisioning request. The draft is changed to "Validated" state only if validation returns success
      operationId: validateFocomProvisioningRequestDraft
      tags:
        - Draft Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "200":
          description: OK - Validation completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}/draft/reject:
    post:
      summary: Reject FOCOM provisioning request draft
      description: Reject a draft in "Validated" state so that it is returned back to "Draft" state
      operationId: rejectFocomProvisioningRequestDraft
      tags:
        - Draft Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "200":
          description: OK - Draft rejected and returned to Draft state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "400":
          description: Bad Request - Draft is not in validated state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}/draft/approve:
    post:
      summary: Approve FOCOM provisioning request draft
      description: Approve the current draft FOCOM provisioning request. Only allowed if the draft is in "Validated" state
      operationId: approveFocomProvisioningRequestDraft
      tags:
        - Draft Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "200":
          description: OK - Draft approved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "400":
          description: Bad Request - Draft is not in validated state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}/revisions:
    get:
      summary: List FOCOM provisioning request revisions
      description: List all (current and previous) approved FOCOM provisioning request revisions
      operationId: listFocomProvisioningRequestRevisions
      tags:
        - Revision Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
      responses:
        "200":
          description: OK - List of FOCOM provisioning request revisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FocomProvisioningRequestData"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}/revisions/{revisionId}:
    get:
      summary: Get specific FOCOM provisioning request revision
      description: Get the specific approved FOCOM provisioning request revision
      operationId: getFocomProvisioningRequestRevision
      tags:
        - Revision Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
        - $ref: "#/components/parameters/RevisionId"
      responses:
        "200":
          description: OK - FOCOM provisioning request revision details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /focom-provisioning-requests/{provisioningRequestId}/revisions/{revisionId}/draft:
    post:
      summary: Create draft from revision
      description: Create a FOCOM provisioning request in draft revision based on a previously approved revision
      operationId: createDraftFromRevision
      tags:
        - Revision Management
      parameters:
        - $ref: "#/components/parameters/ProvisioningRequestId"
        - $ref: "#/components/parameters/RevisionId"
      responses:
        "201":
          description: Created - Draft created from revision successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocomProvisioningRequestData"
        "400":
          description: Bad Request - Draft already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

