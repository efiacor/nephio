---

# Preload services for Focom NBI

focom-operator-controller-manager-nbi-service:
  AefProfiles:
  - interfaceDescriptions:
    - ipv4Addr: "focom-operator-controller-manager-nbi-service.focom-operator-system.svc.cluster.local"
      port: 8080
      securityMethods:
      - PKI
    Versions:
      - ApiVersion: ""
        Resources:
        - CommType: REQUEST_RESPONSE
          Operations:
          - DELETE
          - GET
          - PATCH
          - POST
          - PUT
          ResourceName: root
          Uri: "/"
  ApiName: focom-nbi
