# This file is a placeholder for the gitea-secret
# The actual secret will be copied from the default namespace during deployment
# 
# The Makefile deploy target will execute:
#   kubectl get secret gitea-secret -n default -o yaml | \
#     sed 's/namespace: default/namespace: config-management-system/' | \
#     kubectl apply -f -
#
# If you need to create the secret manually, use:
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: gitea-secret
#   namespace: config-management-system
# type: kubernetes.io/basic-auth
# data:
#   username: <base64-encoded-username>
#   token: <base64-encoded-token>
#   password: <base64-encoded-password>
