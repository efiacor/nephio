apiVersion: v1
kind: Secret
metadata:
  name: gitea-secret
  namespace: default
type: kubernetes.io/basic-auth
data:
  # Base64-encoded username (e.g., "nephio")
  # To encode: echo -n "nephio" | base64
  username: bmVwaGlv
  
  # Base64-encoded password
  # To encode: echo -n "your-password" | base64
  password: YTg2YzY5YTJhNThlYjQ1ODkyZDIwYTQ0M2MxZTI5NGY0ZTdjMWU3YQ==
  
  # Base64-encoded Gitea access token (required for Porch)
  # To encode: echo -n "your-gitea-token" | base64
  bearerToken: YTg2YzY5YTJhNThlYjQ1ODkyZDIwYTQ0M2MxZTI5NGY0ZTdjMWU3YQ==

---
# Instructions:
# 1. Replace <BASE64_ENCODED_PASSWORD> with your base64-encoded password:
#    echo -n "your-password" | base64
#
# 2. Replace <BASE64_ENCODED_TOKEN> with your base64-encoded Gitea access token:
#    echo -n "your-gitea-token" | base64
#
# 3. Apply the secret:
#    kubectl apply -f gitea-secret.yaml
#
# 4. Restart Porch controllers to pick up the new secret:
#    kubectl rollout restart deployment/porch-controllers -n porch-system
